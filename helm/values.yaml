# Default values for microcron-ce Helm chart

# Replica count
replicaCount: 1

# Image configuration
image:
  repository: blazingbrainz/microcron-ce
  pullPolicy: IfNotPresent
  tag: "0.1.0"

# Image pull secrets
imagePullSecrets: []

# Kubernetes namespace
namespace: default

# ConfigMap name containing cron scripts
configMapName: microcron-scripts

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# Resources
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Logging configuration
logging:
  logDir: /var/log/microcron-ce
  retentionDays: 7

# PersistentVolume configuration
persistence:
  enabled: true
  storageClassName: standard
  size: 10Gi
  mountPath: /var/log/microcron-ce

# Environment variables
env:
  - name: TZ
    value: UTC

# Liveness and readiness probes
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Debug mode (for development)
debug: false

# Scripts to include in the ConfigMap
scripts:
  health-check.sh: |
    #!/bin/bash
    # */5 * * * *
    echo "[$(date +'%Y-%m-%d %H:%M:%S')] Service is healthy and running"
    echo "Microcron-CE instance is operational"
  
  example-cron.sh: |
    #!/bin/bash
    # 0 * * * *
    echo "[$(date +'%Y-%m-%d %H:%M:%S')] This is an example cron job"
    echo "Running at the top of every hour"
    echo "Script executed successfully!"
