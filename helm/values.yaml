# Default values for microcron-ce Helm chart

# Replica count
replicaCount: 1

# Image configuration
image:
  repository: ghcr.io/blazingbrainz/microcron-ce
  pullPolicy: IfNotPresent
  tag: "0.2.1"

# Image pull secrets (required for private GHCR)
imagePullSecrets: []
  # - name: ghcr-secret

# Kubernetes namespace
namespace: default

# ConfigMap name containing cron scripts
# This ConfigMap will be mounted as a volume at /etc/microcron-ce/scripts
# Each key in the ConfigMap becomes a script file
configMapName: microcron-scripts

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# Resources
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Logging configuration
logging:
  logDir: /var/log/microcron-ce
  retentionDays: 7

# PersistentVolume configuration
persistence:
  enabled: true
  storageClassName: standard
  size: 10Gi
  mountPath: /var/log/microcron-ce

# Environment variables
env:
  - name: TZ
    value: UTC

# Optional: List of Kubernetes opaque secrets to mount for use in scripts.
# Each secret is mounted at /etc/microcron-ce/secrets/<name>/.
# Reference in scripts with: # secretname: KEY1, KEY2
secretMounts: []
# Example:
# secretMounts:
#   - name: my-db-secret
#   - name: api-credentials

# Optional: Sidecar containers for utility tools
# Sidecars share all mounts with the main container (scripts, secrets, logs)
# Includes: curl, wget, jq, awscli, postgresql-client, mysql-client, git, ssh, python3
# Runs as 'nobody' user (UID 65534) for security in production
sidecars: []
# Example: Use pre-built utilities image
# sidecars:
#   - name: utilities
#     image: ghcr.io/blazingbrainz/microcron-ce-utilities:0.2.1
#     imagePullPolicy: IfNotPresent
#     resources:
#       requests:
#         memory: 256Mi
#         cpu: 100m
#       limits:
#         memory: 512Mi
#         cpu: 500m
#     # Optional: Override security context (default: runs as 'nobody' user)
#     securityContext:
#       runAsNonRoot: true
#       runAsUser: 65534  # nobody user

# Liveness and readiness probes
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Debug mode (for development)
debug: false

# Scripts to include in the ConfigMap
# Each key becomes a script file mounted at /etc/microcron-ce/scripts/<key>
# The first comment line (after shebang) should be the cron schedule: # * * * * *
# Optional: The second comment line can specify secrets: # secretname: KEY1, KEY2
scripts:
  health-check.sh: |
    #!/bin/bash
    # */5 * * * *
    echo "[$(date +'%Y-%m-%d %H:%M:%S')] Service is healthy and running"
    echo "Microcron-CE instance is operational"

  example-cron.sh: |
    #!/bin/bash
    # 0 * * * *
    echo "[$(date +'%Y-%m-%d %H:%M:%S')] This is an example cron job"
    echo "Running at the top of every hour"
    echo "Script executed successfully!"

  # Example script using secrets (uncomment to use)
  # example-with-secrets.sh: |
  #   #!/bin/bash
  #   # 0 * * * *
  #   # my-db-secret: DB_USER, DB_PASS, DB_HOST
  #   echo "Connecting to database at $DB_HOST as $DB_USER"
