apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microcron-ce.fullname" . }}
  labels:
    {{- include "microcron-ce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "microcron-ce.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "microcron-ce.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "microcron-ce.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      {{- if .Values.sidecars }}
      {{- range $index, $sidecar := .Values.sidecars }}
      - name: {{ $sidecar.name }}
        image: "{{ $sidecar.image }}"
        imagePullPolicy: {{ $sidecar.imagePullPolicy | default "IfNotPresent" }}
        {{- if $sidecar.securityContext }}
        securityContext:
          {{- toYaml $sidecar.securityContext | nindent 12 }}
        {{- else }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        {{- end }}
        {{- if $sidecar.resources }}
        resources:
          {{- toYaml $sidecar.resources | nindent 12 }}
        {{- end }}
        volumeMounts:
        - name: scripts
          mountPath: /etc/microcron-ce/scripts
          readOnly: true
        {{- if .Values.sidecars }}
        - name: tools
          mountPath: /opt/microcron-tools
          readOnly: true
        {{- end }}
        {{- range .Values.secretMounts }}
        - name: secret-{{ .name }}
          mountPath: /etc/microcron-ce/secrets/{{ .name }}
          readOnly: true
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: logs
          mountPath: {{ .Values.logging.logDir }}
        {{- end }}
        {{- with $sidecar.volumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $sidecar.env }}
        env:
          {{- toYaml $sidecar.env | nindent 12 }}
        {{- end }}
        {{- if $sidecar.command }}
        command:
          {{- toYaml $sidecar.command | nindent 12 }}
        {{- end }}
        {{- if $sidecar.args }}
        args:
          {{- toYaml $sidecar.args | nindent 12 }}
        {{- end }}
      {{- end }}
      {{- end }}
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
          - --namespace={{ .Values.namespace }}
          - --configmap={{ .Values.configMapName }}
          - --log-dir={{ .Values.logging.logDir }}
          - --retention-days={{ .Values.logging.retentionDays }}
        {{- if .Values.debug }}
          - --debug
        {{- end }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
          {{- toYaml .Values.env | nindent 12 }}
          {{- if .Values.sidecars }}
          - name: PATH
            value: "/opt/microcron-tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          {{- end }}
        {{- if .Values.livenessProbe }}
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - ps aux | grep microcron-ce | grep -v grep
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
        {{- end }}
        {{- if .Values.readinessProbe }}
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - ps aux | grep microcron-ce | grep -v grep
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: scripts
          mountPath: /etc/microcron-ce/scripts
          readOnly: true
        {{- if .Values.sidecars }}
        - name: tools
          mountPath: /opt/microcron-tools
          readOnly: true
        {{- end }}
        {{- range .Values.secretMounts }}
        - name: secret-{{ .name }}
          mountPath: /etc/microcron-ce/secrets/{{ .name }}
          readOnly: true
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: logs
          mountPath: {{ .Values.logging.logDir }}
        {{- end }}
      volumes:
      - name: scripts
        configMap:
          name: {{ .Values.configMapName }}
      {{- if .Values.sidecars }}
      - name: tools
        emptyDir: {}
      {{- end }}
      {{- range .Values.secretMounts }}
      - name: secret-{{ .name }}
        secret:
          secretName: {{ .name }}
      {{- end }}
      {{- if .Values.persistence.enabled }}
      - name: logs
        persistentVolumeClaim:
          claimName: {{ include "microcron-ce.fullname" . }}-pvc
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
