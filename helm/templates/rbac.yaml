apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "microcron-ce.fullname" . }}
  labels:
    {{- include "microcron-ce.labels" . | nindent 4 }}
rules: []
# Note: No RBAC rules needed since scripts are loaded from mounted ConfigMap volume
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "microcron-ce.fullname" . }}
  labels:
    {{- include "microcron-ce.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "microcron-ce.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "microcron-ce.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
